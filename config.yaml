# PodAgent Configuration

channels:
  # Add YouTube channel URLs or channel IDs here
  # Format: channel_id or full channel URL
  - "UC..."  # Replace with actual channel IDs

settings:
  audio_format: mp3
  audio_quality: best
  storage:
    # Root data directory (per-video folders created under this)
    audio_dir: /home/shalva/projects/PodAgent/data
  yt_dlp_path: .venv/bin/yt-dlp  # Path to yt-dlp binary (relative or absolute)
  js_runtime_path: ~/.deno/bin/deno  # Full path to deno for YouTube n-challenge solving
  transcription:
    model: turbo  # whisper turbo model (auto-fallback to medium if GPU < 6GB)
    language: auto  # auto-detect or specify (e.g., "en")
    beam_size: 5
    carry_initial_prompt: true  # carry context prompt across all decode windows
    # Whisper truncates at ~30min (1800s), so chunk audio into pieces under that limit
    max_chunk_seconds: 1800  # Split audio into chunks if longer than this
  diarization:
    pipeline: pyannote/speaker-diarization-community-1
    hf_token: YOUR_HF_TOKEN_HERE  # Replace with your actual HuggingFace token
  monitoring:
    poll_interval: 6h  # Check channels every 6 hours
    max_concurrent: 3  # Max parallel downloads/transcriptions
  llm:
    provider: lmstudio  # "ollama" or "lmstudio"
    model: qwopus3.6-27b-v2-mtp-nvfp4  # Default when no LM Studio model is loaded (auto-discovered otherwise)
    base_url: http://localhost:11434  # Ollama default port
    lmstudio_url: http://192.168.1.50:1234  # LM Studio default port (update with your actual IP)
    temperature: 0.7
    max_tokens: 4096
    timeout_seconds: 600
    streaming: true
  tts:
    provider: edge-tts  # "edge-tts" or "elevenlabs"
    voice: en-US-AvaMultilingualNeural  # Voice name (see src/tts_generator.py for list)
    rate: "+0%"  # Speech rate (+/- percentage)
    pitch: "+0Hz"  # Speech pitch (+/- Hz)
    output_format: mp3  # Output format
    elevenlabs_api_key: ""  # API key for ElevenLabs (set if using elevenlabs provider)
    elevenlabs_model: eleven_multilingual_v2  # ElevenLabs model ID
  gpu:
    target: cuda  # Primary GPU target
    fallback: cpu  # CPU fallback if no GPU
    min_vram_gb: 6  # Minimum VRAM for turbo model

logging:
  level: INFO
  file: /home/shalva/projects/PodAgent/podagent.log
